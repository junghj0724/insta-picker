# 1. 애플리케이션 이름
spring.application.name=backend

# 2. MySQL 데이터베이스 연결 기본 주소
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/instapicker?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=root

# 3. JPA(데이터베이스 관리 도구) 설정
# update로 설정해두면 자바 코드(Entity)를 보고 스프링이 알아서 테이블을 만들어줍니다.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 4. 비밀 금고(secret) 파일 함께 읽어오기
spring.profiles.include=secret